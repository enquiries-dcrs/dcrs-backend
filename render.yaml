# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Typical layout: Next.js on Vercel (frontend) + this API on Render (backend).
#
# Required secrets in the Render dashboard (Environment):
#   DATABASE_URL, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
#
# Vercel pairing (also set in Render):
#   FRONTEND_URL = production Vercel URL, e.g. https://your-app.vercel.app  (no trailing slash)
#   NEXT_PUBLIC_API_URL on Vercel must point to this service URL, e.g. https://dcrs-backend.onrender.com
#
# If you deploy from a monorepo whose root contains `backend/`, add under this service:
#   rootDir: backend
#
# Repo (backend-only): https://github.com/enquiries-dcrs/dcrs-backend

services:
  - type: web
    name: dcrs-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
