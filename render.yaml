# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo: https://github.com/enquiries-dcrs/dcrs-backend
# Set secret env vars in the Render dashboard (Environment): DATABASE_URL, SUPABASE_URL, SUPABASE_ANON_KEY, etc.

services:
  - type: web
    name: dcrs-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
