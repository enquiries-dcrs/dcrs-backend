# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Connect this service to the *backend-only* GitHub repo (repository root = this app):
#   https://github.com/enquiries-dcrs/dcrs-backend
# Do not point Render at the monorepo root; publish `backend/` with:
#   bash scripts/push-backend-subtree.sh   (from DCRS-App root)
#
# Typical layout: Next.js on Vercel (frontend) + this API on Render.
#
# Required secrets in the Render dashboard (Environment):
#   DATABASE_URL, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
#
# Vercel pairing (also set in Render):
#   FRONTEND_URL = production Vercel URL (no trailing slash)
#   NEXT_PUBLIC_API_URL on Vercel = this service URL, e.g. https://dcrs-backend.onrender.com

services:
  - type: web
    name: dcrs-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
